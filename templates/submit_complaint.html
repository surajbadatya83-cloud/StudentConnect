<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Complaint | StudentConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h1 class="h2 mb-1">Submit Complaint</h1>
                        <p class="text-muted mb-0">Complaints are linked to {{ session.get('student_name') }}.</p>
                    </div>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <form method="post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="title" class="form-label">Title</label>
                                <input type="text" class="form-control" id="title" name="title" value="{{ request.form.get('title', '') }}" required>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" name="description" rows="5" required>{{ request.form.get('description', '') }}</textarea>
                            </div>

                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label for="tag" class="form-label">Category Tag</label>
                                    <select class="form-select" id="tag" name="tag" required>
                                        <option value="">Select category</option>
                                        {% for category in category_tags %}
                                            <option value="{{ category }}" {% if request.form.get('tag') == category %}selected{% endif %}>{{ category }}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="col-md-4">
                                    <label for="department" class="form-label">Department</label>
                                    <select class="form-select" id="department" name="department" required>
                                        <option value="">Select department</option>
                                        {% for item in departments %}
                                            <option value="{{ item }}" {% if request.form.get('department') == item %}selected{% endif %}>{{ item }}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="col-md-4">
                                    <label for="priority" class="form-label">Priority</label>
                                    <select class="form-select" id="priority" name="priority" required>
                                        <option value="">Select priority</option>
                                        {% for item in priority_levels %}
                                            <option value="{{ item }}" {% if request.form.get('priority') == item %}selected{% endif %}>{{ item }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>

                            <div class="mt-3 mb-4">
                                <label for="image" class="form-label">Image Proof (Optional)</label>
                                <input type="file" class="form-control" id="image" name="image" accept=".png,.jpg,.jpeg">
                            </div>

                            <button type="submit" class="btn btn-primary">Submit Complaint</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
